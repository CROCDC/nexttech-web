services:
  web:
    build: .
    ports:
      - "160:160"
    environment:
      - FLASK_APP=run.py
      - FLASK_DEBUG=0
      - DATABASE_URL=postgresql://pantech:i3OH`vY,(e1*Wg=9St@db:5432/pantech
      - UPLOAD_FOLDER=/pantech/uploads
    depends_on:
      - db
    restart: unless-stopped
    volumes:
      - uploads_data:/pantech/uploads

  db:
    image: postgres:latest
    environment:
      - POSTGRES_USER=pantech
      - POSTGRES_PASSWORD=i3OH`vY,(e1*Wg=9St
      - POSTGRES_DB=pantech
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5430:5432"
    restart: always

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    environment:
      - DATA_SOURCE_NAME=postgresql://pantech:i3OH`vY,(e1*Wg=9St@db:5432/pantech?sslmode=disable
    ports:
      - "9187:9187"
    depends_on:
      - db
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  postgres_data:
  uploads_data:
  grafana_data:
