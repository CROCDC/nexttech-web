services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: pantech-web:latest
    container_name: pantech-web
    ports:
      - "160:80"
    restart: always
    networks:
      - pantech-network
    volumes:
      - type: bind
        source: .
        target: /var/www/html
        read_only: true

networks:
  pantech-network:
    driver: bridge 