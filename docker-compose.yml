services:
  web:
    container_name: nexttech-web-app
    image: nexttech-web
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - FLASK_APP=run.py
      - FLASK_DEBUG=0
      - DATABASE_URL=postgresql://nexttech:RUNSUMnimObjEWerManSIAHORpHicaTt@db:5432/nexttech
      - UPLOAD_FOLDER=/nexttech/uploads
      - VIRTUAL_HOST=nexttech.com.ar
      - VIRTUAL_PORT=7001
      - LETSENCRYPT_HOST=nexttech.com.ar
      - LETSENCRYPT_EMAIL=admin@nexttech.com.ar
    ports:
      - "7001:7001"
    expose:
      - "7001"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - uploads_data:/nexttech/uploads
    networks:
      - proxy

  db:
    container_name: nexttech-web-db
    image: postgres:16
    environment:
      - POSTGRES_USER=nexttech
      - POSTGRES_PASSWORD=RUNSUMnimObjEWerManSIAHORpHicaTt
      - POSTGRES_DB=nexttech
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5430:5432"
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexttech -d nexttech"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - proxy

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    environment:
      - DATA_SOURCE_NAME=postgresql://nexttech:RUNSUMnimObjEWerManSIAHORpHicaTt@db:5432/nexttech?sslmode=disable
    ports:
      - "9187:9187"
    depends_on:
      - db
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9091:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus-config/prometheus.yml:ro
    command:
      - '--config.file=/etc/prometheus-config/prometheus.yml'
    restart: unless-stopped

networks:
  proxy:
    external: true

volumes:
  postgres_data:
  uploads_data:
