services:
  web:
    image: pantech-web
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - FLASK_APP=run.py
      - FLASK_DEBUG=0
      - DATABASE_URL=postgresql://pantech:RUNSUMnimObjEWerManSIAHORpHicaTt@db:5432/pantech
      - UPLOAD_FOLDER=/pantech/uploads
      - VIRTUAL_HOST=pantech.solutions
      - VIRTUAL_PORT=160
      - LETSENCRYPT_HOST=pantech.solutions
      - LETSENCRYPT_EMAIL=admin@pantech.solutions
    expose:
      - "160"
    depends_on:
      - db
    restart: unless-stopped
    volumes:
      - uploads_data:/pantech/uploads
    networks:
      - proxy

  db:
    image: postgres:latest
    environment:
      - POSTGRES_USER=pantech
      - POSTGRES_PASSWORD=RUNSUMnimObjEWerManSIAHORpHicaTt
      - POSTGRES_DB=pantech
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5430:5432"
    restart: always
    networks:
      - proxy

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    environment:
      - DATA_SOURCE_NAME=postgresql://pantech:RUNSUMnimObjEWerManSIAHORpHicaTt@db:5432/pantech?sslmode=disable
    ports:
      - "9187:9187"
    depends_on:
      - db
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9091:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus-config/prometheus.yml:ro
    command:
      - '--config.file=/etc/prometheus-config/prometheus.yml'
    restart: unless-stopped

networks:
  proxy:
    external: true

volumes:
  postgres_data:
  uploads_data:
