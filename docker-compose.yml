version: '3'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: pantech-web:latest
    container_name: pantech-web
    ports:
      - "160:80"
    restart: always
    networks:
      - pantech-network
    volumes:
      - ./index.html:/var/www/html/index.html:ro
      - ./styles.css:/var/www/html/styles.css:ro
      - ./script.js:/var/www/html/script.js:ro
      - ./images:/var/www/html/images:ro

networks:
  pantech-network:
    driver: bridge 