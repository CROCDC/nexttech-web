<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo Footer Next Tech</title>
    <!--
    ========== HOW TO USE THIS FOOTER ON YOUR SITE ==========

    1. Include the script with full URL (works on any domain):
       <script src="https://nexttech.com.ar/static/js/nexttechFooter.js"></script>

    2. Where you want the footer to appear, add:
       <nexttech-footer></nexttech-footer>

    Minimal example:
    <body>
        <main>... your content ...</main>
        <script src="https://nexttech.com.ar/static/js/nexttechFooter.js"></script>
        <nexttech-footer></nexttech-footer>
    </body>

    The footer has a transparent background; if you place it inside your own
    footer with a background color, that will show through. No extra CSS
    or framework required.
    =========================================================
    -->
</head>
<body>
    <script src="https://nexttech.com.ar/static/js/nexttechFooter.js"></script>
    <nexttech-footer></nexttech-footer>
</body>
</html>
