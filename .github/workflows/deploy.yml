# Trigger Jenkins build on push to main.
# JOB_NAME on Jenkins: nexttech-web (path /CursorProjects/nexttech-web).
# Required GitHub secrets: JENKINS_USER, JENKINS_PASSWORD, JENKINS_API_TOKEN

name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Jenkins Build with cookie and crumb
        run: |
          # Save cookie and crumb JSON
          curl -c cookie.txt -s "https://jenkins.pantech.solutions/crumbIssuer/api/json" \
            --user "${{ secrets.JENKINS_USER }}:${{ secrets.JENKINS_PASSWORD }}" -o crumb.json

          # Extract crumb header with Python
          CRUMB_HEADER=$(python3 -c "import json; d=json.load(open('crumb.json')); print(d['crumbRequestField'] + ': ' + d['crumb'])")
          echo "Using header: $CRUMB_HEADER"

          # POST to trigger the job (nexttech-web)
          curl -b cookie.txt -X POST -H "$CRUMB_HEADER" -H "Content-Type: application/x-www-form-urlencoded" \
            --data "" "https://jenkins.pantech.solutions/job/nexttech-web/build?token=${{ secrets.JENKINS_API_TOKEN }}" \
            --user "${{ secrets.JENKINS_USER }}:${{ secrets.JENKINS_PASSWORD }}"
