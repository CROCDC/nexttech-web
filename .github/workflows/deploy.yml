# Trigger Jenkins build on push to main.
# Set JOB_NAME below to your Jenkins job name (e.g. nexttech-web-prod).
# Required GitHub secrets: JENKINS_USER, JENKINS_PASSWORD, JENKINS_API_TOKEN

name: Deploy

on:
  push:
    branches:
      - main

env:
  JOB_NAME: nexttech-web-prod   # replace with your Jenkins job name if different

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Jenkins Build with cookie and crumb
        env:
          JENKINS_USER: ${{ secrets.JENKINS_USER }}
          JENKINS_PASSWORD: ${{ secrets.JENKINS_PASSWORD }}
          JENKINS_API_TOKEN: ${{ secrets.JENKINS_API_TOKEN }}
        run: |
          if [ -z "$JENKINS_USER" ] || [ -z "$JENKINS_PASSWORD" ] || [ -z "$JENKINS_API_TOKEN" ]; then
            echo "::error::Missing GitHub secrets. Configure JENKINS_USER, JENKINS_PASSWORD and JENKINS_API_TOKEN in repo Settings > Secrets and variables > Actions."
            exit 1
          fi
          # Save cookie and crumb JSON (env vars avoid newline/special-char issues in secrets)
          curl -c cookie.txt -s -w "%{http_code}" -o crumb.json \
            --user "$JENKINS_USER:$JENKINS_PASSWORD" \
            "https://jenkins.pantech.solutions/crumbIssuer/api/json" > http_code.txt
          HTTP_CODE=$(cat http_code.txt)
          if [ "$HTTP_CODE" != "200" ] || ! head -c1 crumb.json | grep -q '{'; then
            echo "::error::Jenkins crumb request failed (HTTP $HTTP_CODE). Check URL and credentials. Response: $(head -c 200 crumb.json)"
            exit 1
          fi
          # Extract crumb header with Python
          CRUMB_HEADER=$(python3 -c "import json; d=json.load(open('crumb.json')); print(d['crumbRequestField'] + ': ' + d['crumb'])")
          echo "Using header: $CRUMB_HEADER"

          # POST to trigger the job
          curl -b cookie.txt -X POST -H "$CRUMB_HEADER" -H "Content-Type: application/x-www-form-urlencoded" \
            --data "" "https://jenkins.pantech.solutions/job/$JOB_NAME/build?token=$JENKINS_API_TOKEN" \
            --user "$JENKINS_USER:$JENKINS_PASSWORD"
